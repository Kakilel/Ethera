<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Verify Your Email</title>
</head>

<body style="margin:0;padding:0;background:#0a0a0a;font-family:Arial,sans-serif;color:white;">

  <table width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center" style="padding:40px 20px;">

        <table width="600" cellpadding="0" cellspacing="0"
          style="background:#111;border:1px solid #222;border-radius:24px;padding:40px;">

          <!-- LOGO -->
          <tr>
            <td align="center">
              <h1 style="font-size:32px;margin:0;color:white;">
                Ethera
              </h1>

              <p style="color:#999;margin-top:8px;">
                Your fitness journey starts here.
              </p>
            </td>
          </tr>

          <!-- SPACER -->
          <tr>
            <td height="40"></td>
          </tr>

          <!-- CONTENT -->
          <tr>
            <td>
              <h2 style="font-size:26px;color:white;margin-bottom:12px;">
                Verify your email
              </h2>

              <p style="color:#b3b3b3;font-size:16px;line-height:1.7;">
                Hey {{ username }},
                welcome to Ethera.
                Click the button below to verify your account and unlock your dashboard.
              </p>
            </td>
          </tr>

          <!-- BUTTON -->
          <tr>
            <td align="center" style="padding:35px 0;">
              <a href="{{ verification_link }}"
                style="
                  background:white;
                  color:black;
                  text-decoration:none;
                  padding:16px 32px;
                  border-radius:14px;
                  font-weight:bold;
                  display:inline-block;
                ">
                Verify Email
              </a>
            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td>
              <p style="color:#666;font-size:13px;line-height:1.6;text-align:center;">
                If you didn’t create an account, you can safely ignore this email.
              </p>
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
